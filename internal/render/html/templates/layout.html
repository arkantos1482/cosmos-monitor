<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>pmtop — {{.Moniker}} · {{.PageTitle}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>{{.CSS}}</style>
</head>
<body hx-boost="true">
<header class="dash-header">
<div class="dash-header__brand">
<span class="dash-header__mark" aria-hidden="true"></span>
<h1>PMT operations</h1>
</div>
<span class="meta">{{.Moniker}} · {{.PageTitle}} · <span class="meta__live">live · 5s</span></span>
</header>
<div class="dash-shell">
{{.Nav}}
<div class="dash-content">
<main class="dash-main" id="data"
  hx-get="{{.DataURL}}"
  hx-trigger="every 5s"
  hx-swap="innerHTML settle:0.15s">{{.Content}}</main>
</div>
</div>
</body>
</html>
